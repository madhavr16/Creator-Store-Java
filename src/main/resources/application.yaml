spring:
  application:
    name: CreatorStore

#Database Information
datasource :
  url: ${DATABASE_URL}
  username: ${DATABASE_USERNAME}
  password: ${DATABASE_PASSWORD}

#Hibernate - ORM Configuration (JPA (Java Persistence API): A specification for managing relational data in Java.)
jpa :
  hibernate :
    ddl-auto : update
  show-sql : true
  properties :
    hibernate :
      format_sql : true